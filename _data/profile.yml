short_bio: |
  <p style="margin-bottom: 0.75em;">
    Note that everyone calls me (in English) by my middle name, <em>Henny</em>. I am a <strong>linguist</strong> and <strong>cognitive scientist</strong> 
    who mainly does fundamental research in these areas:
  </p>

  <ul style="padding-left: 1.2em; color:#444;">
  <li style="margin-bottom: 0.8em;">
    <strong style="color:#2c5f9e;">Prosody and speech style</strong><br />
    <span style="font-size: 0.95em;">
      In speech directed to infants and children by caregivers, as used in digital media, and produced using emerging speech
      technologies
    </span>
  </li>

  <li style="margin-bottom: 0.8em;">
    <strong style="color:#2c5f9e;">Technology in second language (L2) acquisition</strong><br />
    <span style="font-size: 0.95em;">
      With adults learning to listen and read in their L2, and with children learning multiple languages in heritage and immigrant contexts
    </span>
  </li>

  <li style="margin-bottom: 0.6em;">
    <strong style="color:#2c5f9e;">Speech learning in infancy and childhood</strong><br />
    <span style="font-size: 0.95em;">
      How seeing talking faces and themselves producing speech may help young learners acquire phonological patterns
    </span>
  </li>

  </ul>

  <p style="
    font-size: 0.8em;
    color: #555;
    padding-left: 0.75em;
    margin-top: 0.75em;
  ">
    Contact me for MA, PhD, and Postdoc opportunities: We embrace open science and creative approaches to interesting problems.
    Selected publications highlight work from scholars recently trained in my research group. My CV has a full list of publications,
    and more information about my teaching.
  </p>


