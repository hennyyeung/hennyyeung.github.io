short_bio: 
>-
  <p>
    This page is under construction.
  </p>
  <p>
    I am a researcher in <strong>Linguistics</strong> and <strong>Cognitive Science</strong>,
    with interests spanning three interrelated areas
  </p>
  <ol>
    <li>
      <strong>Prosody and speech style</strong>
      <ul>
        <li>In speech directed to infants and children</li>
        <li>In digital media and speech technologies</li>
      </ul>
    </li>

    <li>
      <strong>Technology in second language (L2) acquisition</strong>
      <ul>
        <li>Children using their first and second languages while learning to read</li>
        <li>
          Adults learning to listen and read in their L2, including through online
          applications and artificially generated voices
        </li>
      </ul>
    </li>

    <li>
      <strong>Foundations of speech learning in infancy and childhood</strong>
      <ul>
        <li>
          How auditory, visual, and sensorimotor cues from faces and self-produced
          speech support speech acquisition
        </li>
        <li>
          My early graduate work examined how infants acquire speech sound patterns
        </li>
      </ul>
    </li>
  </ol>

  <p style="font-size: 0.8em; color: #555;">
    Scholars trained in my group have active hyperlinks in publication author lists.
  </p>



